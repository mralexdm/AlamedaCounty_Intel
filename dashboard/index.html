<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NextKey Home Offer — Alameda County Motivated Seller Leads</title>
<style>
  :root {
    --navy: #0b1929;
    --navy-2: #12263f;
    --gold: #c5b358;
    --text: #e8edf4;
    --muted: #93a4bb;
    --line: #1f3a5f;
    --hot: #e5484d;
    --warm: #f5a623;
    --cool: #2f9e6b;
    --chip: #1b3252;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--navy);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--navy-2), var(--navy));
    position: sticky; top: 0; z-index: 5;
  }
  h1 { margin: 0; font-size: 20px; letter-spacing: .3px; }
  h1 span { color: var(--gold); }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .wrap { padding: 20px 28px 60px; }

  .stats { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 20px; }
  .stat {
    background: var(--navy-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 18px; min-width: 140px;
  }
  .stat .n { font-size: 26px; font-weight: 700; color: var(--gold); }
  .stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

  .controls { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: center; }
  input[type="search"], select {
    background: var(--navy-2); border: 1px solid var(--line); color: var(--text);
    padding: 10px 12px; border-radius: 9px; font-size: 14px; outline: none;
  }
  input[type="search"] { min-width: 260px; flex: 1; }
  input::placeholder { color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    text-align: left; padding: 10px 12px; color: var(--muted);
    font-weight: 600; border-bottom: 1px solid var(--line);
    text-transform: uppercase; font-size: 11px; letter-spacing: .6px;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--gold); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid rgba(31,58,95,.5); vertical-align: top; }
  tbody tr:hover { background: rgba(18,38,63,.6); }

  .score {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 38px; padding: 4px 8px; border-radius: 8px; font-weight: 700;
    color: #0b1929;
  }
  .s-hot { background: var(--hot); color: #fff; }
  .s-warm { background: var(--warm); }
  .s-cool { background: var(--cool); color: #fff; }

  .owner { font-weight: 600; }
  .muted { color: var(--muted); }
  .flags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .flag {
    background: var(--chip); border: 1px solid var(--line); color: #cdd9ea;
    font-size: 11px; padding: 2px 7px; border-radius: 20px; white-space: nowrap;
  }
  a.doclink { color: var(--gold); text-decoration: none; }
  a.doclink:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .err { color: var(--hot); }
  .pill { font-size: 11px; color: var(--muted); }
  footer { color: var(--muted); font-size: 12px; padding: 18px 28px; border-top: 1px solid var(--line); }
</style>
</head>
<body>
  <header>
    <h1>NextKey Home Offer — <span>Alameda County</span> Motivated Seller Leads</h1>
    <div class="sub" id="meta">Loading leads…</div>
  </header>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="controls">
      <input type="search" id="q" placeholder="Search owner, address, city, document #…" />
      <select id="cat"><option value="">All lead types</option></select>
      <select id="minScore">
        <option value="0">Any score</option>
        <option value="50">Score 50+</option>
        <option value="70">Score 70+</option>
        <option value="85">Score 85+ (hot)</option>
      </select>
      <span class="pill" id="count"></span>
    </div>

    <table id="tbl">
      <thead>
        <tr>
          <th data-k="score">Score</th>
          <th data-k="owner">Owner</th>
          <th data-k="cat_label">Lead Type</th>
          <th data-k="doc_type">Document</th>
          <th data-k="prop_city">Property</th>
          <th data-k="amount">Amount</th>
          <th data-k="filed">Filed</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="empty" id="empty" style="display:none"></div>
  </div>

  <footer id="foot"></footer>

<script>
const DATA_URL = "../data/output.json";
let RECORDS = [];
let sortKey = "score";
let sortDir = -1; // default: highest score first

const $ = (s) => document.querySelector(s);

function scoreClass(s) {
  if (s >= 85) return "s-hot";
  if (s >= 60) return "s-warm";
  return "s-cool";
}
function fmtAmount(a) {
  const n = parseFloat(a);
  if (!a || isNaN(n) || n === 0) return '<span class="muted">—</span>';
  return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
}
function esc(s) {
  return (s == null ? "" : String(s)).replace(/[&<>"]/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function render() {
  const q = $("#q").value.trim().toLowerCase();
  const cat = $("#cat").value;
  const minScore = parseInt($("#minScore").value, 10) || 0;

  let rows = RECORDS.filter(r => {
    if (cat && r.cat_label !== cat) return false;
    if ((r.score || 0) < minScore) return false;
    if (!q) return true;
    const hay = [r.owner, r.prop_address, r.prop_city, r.mail_address,
                 r.mail_city, r.doc_num, r.doc_type, r.cat_label,
                 (r.flags || []).join(" ")].join(" ").toLowerCase();
    return hay.includes(q);
  });

  rows.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (sortKey === "score" || sortKey === "amount") {
      va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
    } else {
      va = (va || "").toString().toLowerCase();
      vb = (vb || "").toString().toLowerCase();
    }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });

  const tbody = $("#rows");
  tbody.innerHTML = rows.map(r => {
    const prop = [r.prop_address, [r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(" ")]
      .filter(Boolean).join("<br><span class='muted'>") + (r.prop_city ? "</span>" : "");
    const flags = (r.flags || []).map(f => `<span class="flag">${esc(f)}</span>`).join("");
    const docCell = r.clerk_url
      ? `<a class="doclink" href="${esc(r.clerk_url)}" target="_blank" rel="noopener">${esc(r.doc_type) || "View"}</a>
         <div class="muted">${esc(r.doc_num)}</div>`
      : `${esc(r.doc_type)}<div class="muted">${esc(r.doc_num)}</div>`;
    return `<tr>
      <td><span class="score ${scoreClass(r.score)}">${r.score ?? 0}</span></td>
      <td><div class="owner">${esc(r.owner) || '<span class="muted">—</span>'}</div>
          <div class="flags">${flags}</div></td>
      <td>${esc(r.cat_label)}</td>
      <td>${docCell}</td>
      <td>${prop || '<span class="muted">—</span>'}</td>
      <td>${fmtAmount(r.amount)}</td>
      <td class="muted">${esc(r.filed)}</td>
    </tr>`;
  }).join("");

  $("#count").textContent = `${rows.length} of ${RECORDS.length} leads`;
  $("#empty").style.display = rows.length ? "none" : "block";
  if (!rows.length) {
    $("#empty").innerHTML = RECORDS.length
      ? "No leads match the current filters."
      : "No leads yet. Run <code>python src/scraper.py</code> (or <code>--demo</code>) to populate <code>data/output.json</code>.";
  }
}

function buildStats(payload) {
  const recs = payload.records || [];
  const hot = recs.filter(r => (r.score || 0) >= 85).length;
  const withAddr = payload.with_address ?? recs.filter(r => r.prop_address || r.mail_address).length;
  const avg = recs.length ? Math.round(recs.reduce((s, r) => s + (r.score || 0), 0) / recs.length) : 0;
  const stats = [
    ["Total leads", payload.total ?? recs.length],
    ["Hot (85+)", hot],
    ["With address", withAddr],
    ["Avg score", avg],
  ];
  $("#stats").innerHTML = stats.map(([l, n]) =>
    `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const cats = [...new Set(recs.map(r => r.cat_label).filter(Boolean))].sort();
  $("#cat").innerHTML = '<option value="">All lead types</option>' +
    cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");

  const range = payload.date_range || {};
  $("#meta").innerHTML = `Source: ${esc(payload.source || "Alameda County public records")} ·
    ${esc(range.from || "?")} → ${esc(range.to || "?")} ·
    fetched ${esc((payload.fetched_at || "").replace("T", " ").slice(0, 16) || "—")}`;
  $("#foot").textContent = `NextKey Home Offer · data/output.json · sorted by seller score (highest first).`;
}

document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const k = th.dataset.k;
    if (sortKey === k) sortDir *= -1;
    else { sortKey = k; sortDir = (k === "score" || k === "amount") ? -1 : 1; }
    render();
  });
});
["#q", "#cat", "#minScore"].forEach(s => $(s).addEventListener("input", render));

fetch(DATA_URL, { cache: "no-store" })
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(payload => {
    RECORDS = payload.records || [];
    buildStats(payload);
    render();
  })
  .catch(err => {
    $("#meta").innerHTML = `<span class="err">Could not load ${DATA_URL} — ${esc(err.message)}.
      Serve this folder over http (e.g. <code>python -m http.server</code>) so the browser can read the JSON.</span>`;
    $("#empty").style.display = "block";
    $("#empty").textContent = "No data loaded.";
  });
</script>
</body>
</html>

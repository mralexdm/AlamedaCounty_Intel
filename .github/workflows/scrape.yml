name: Scrape Alameda County Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back"
        required: false
        default: "7"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python src/scraper.py

      - name: Prepare dashboard artifact
        run: |
          cp data/output.json dashboard/output.json
          cp data/records.json dashboard/records.json

      - name: Commit updated records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output.json dashboard/output.json data/records.json dashboard/records.json
          git add dashboard/ghl_export.csv data/ghl_export.csv dashboard/leads_ghl.csv data/leads_ghl.csv
          if git diff --cached --quiet; then
            echo "No record changes to commit."
          else
            git commit -m "Update Alameda County lead records"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy dashboard to GitHub Pages
        uses: actions/deploy-pages@v4
